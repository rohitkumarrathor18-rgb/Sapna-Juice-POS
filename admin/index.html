<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin HQ - Sapna Juice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../sapna-core.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
            <div>
                <h1 class="text-3xl font-black text-amber-400 flex items-center gap-3">
                    <span>👑</span> Admin HQ
                </h1>
                <p class="text-slate-400 text-sm mt-1">Manage Menu, Prices, Categories & Kitchens instantly.</p>
            </div>
            <a href="../" class="mt-4 md:mt-0 bg-slate-800 border border-slate-700 hover:border-amber-400 px-5 py-2 rounded-xl transition-all font-bold text-sm">
                ← Back to Central Hub
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <div class="space-y-6">
                
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg">
                    <h2 class="text-xl font-bold text-white mb-4 border-b border-slate-800 pb-2">📂 Categories</h2>
                    <div id="category-list" class="space-y-2 mb-4 max-h-[300px] overflow-y-auto pr-2">
                        </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg">
                    <h2 class="text-xl font-bold text-white mb-4 border-b border-slate-800 pb-2">🍳 Kitchen KDS Nodes</h2>
                    <div id="kitchen-list" class="space-y-2 max-h-[300px] overflow-y-auto pr-2">
                        </div>
                </div>

            </div>

            <div class="col-span-1 lg:col-span-2 bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-lg">
                <h2 class="text-xl font-bold text-white mb-4 border-b border-slate-800 pb-2">🍔 Live Menu Builder</h2>
                
                <div id="menu-list" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[700px] overflow-y-auto pr-2">
                    <div class="text-slate-500 animate-pulse p-4">Loading cloud menu...</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Jab bhi cloud se naya data aaye, screen ko update karo
        window.addEventListener('SAPNA_STATE_UPDATED', (e) => {
            const db = e.detail;
            renderCategories(db.categories);
            renderKitchens(db.kitchens);
            renderMenu(db.menu);
        });

        // 1. RENDER CATEGORIES
        function renderCategories(categories) {
            const container = document.getElementById('category-list');
            if(!categories || categories.length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-sm">No categories found.</p>`;
                return;
            }
            container.innerHTML = categories.map(cat => `
                <div class="flex justify-between items-center bg-slate-950 p-2 rounded border border-slate-800">
                    <span class="font-bold text-sm">${cat}</span>
                    <button onclick="window.Sapna.delCategory('${cat}')" class="text-red-500 hover:bg-red-500/20 px-2 py-1 rounded text-xs font-bold transition-colors">Delete</button>
                </div>
            `).join('');
        }

        // 2. RENDER KITCHENS
        function renderKitchens(kitchens) {
            const container = document.getElementById('kitchen-list');
            if(!kitchens || kitchens.length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-sm">No kitchens found.</p>`;
                return;
            }
            container.innerHTML = kitchens.map(kit => `
                <div class="flex justify-between items-center bg-slate-950 p-2 rounded border border-slate-800">
                    <span class="font-bold text-sm">${kit.icon} ${kit.name}</span>
                    <button onclick="window.Sapna.delKitchen('${kit.id}')" class="text-red-500 hover:bg-red-500/20 px-2 py-1 rounded text-xs font-bold transition-colors">Delete</button>
                </div>
            `).join('');
        }

        // 3. RENDER MENU WITH LIVE PRICE BOX
        function renderMenu(menuItems) {
            const container = document.getElementById('menu-list');
            if(!menuItems || menuItems.length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-sm">Menu is empty.</p>`;
                return;
            }
            
            container.innerHTML = menuItems.map(item => `
                <div class="bg-slate-950 border border-slate-800 p-3 rounded-xl flex justify-between items-center hover:border-slate-600 transition-colors">
                    <div class="overflow-hidden">
                        <h3 class="font-bold text-white text-sm truncate" title="${item.name}">${item.name}</h3>
                        <p class="text-[11px] text-slate-400 mt-0.5">${item.category}</p>
                    </div>
                    
                    <div class="flex items-center gap-2 shrink-0">
                        <div class="flex items-center bg-slate-900 border border-slate-700 rounded-lg px-2 focus-within:border-amber-400 transition-colors">
                            <span class="text-slate-500 text-xs font-serif">₹</span>
                            <input type="number" 
                                value="${item.price}"
                                onchange="window.Sapna.quickPriceUpdate('${item.id}', this.value)"
                                class="w-14 bg-transparent text-amber-400 font-bold p-1.5 outline-none text-right text-sm" 
                            />
                        </div>
                        
                        <button onclick="window.Sapna.delMenu('${item.id}')"
                            class="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white p-2 rounded-lg transition-colors" title="Delete Item">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
