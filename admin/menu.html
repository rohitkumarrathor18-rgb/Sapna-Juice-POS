<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Builder - Sapna Juice Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex font-sans min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-green-800 text-white flex flex-col pt-5 shadow-lg fixed h-full">
        <div class="text-2xl font-bold text-center mb-8 border-b border-green-700 pb-4">
            🍹 Sapna Juice
        </div>
        <nav class="flex flex-col gap-2 px-4">
            <a href="index.html" class="p-3 rounded-lg hover:bg-green-700 transition">📊 Dashboard</a>
            <a href="menu.html" class="bg-green-700 p-3 rounded-lg font-semibold shadow">🍔 Menu Builder</a>
            <a href="#" class="p-3 rounded-lg hover:bg-green-700 transition">🪑 Table Management</a>
            <a href="#" class="p-3 rounded-lg hover:bg-green-700 transition">🧑‍🍳 Staff & Salary</a>
        </nav>
    </aside>

    <!-- Main Content Area (ml-64 is applied to push it right of fixed sidebar) -->
    <main class="flex-1 ml-64 p-8">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-lg shadow-sm">
            <h1 class="text-3xl font-semibold text-gray-800">Menu Builder</h1>
            <span class="bg-green-100 text-green-800 text-xs font-semibold px-3 py-1 rounded">Smart Kitchen Routing : ON</span>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- LEFT SIDE: ADD ITEM FORM (Takes 1 Column) -->
            <div class="bg-white p-6 rounded-lg shadow-sm border-t-4 border-green-600 h-fit">
                <h2 class="text-xl font-bold mb-4 text-gray-700">Add New Product</h2>
                
                <form id="menuForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Product Name</label>
                        <input type="text" id="itemName" required placeholder="e.g. Anar Juice (Pomegranate)" class="mt-1 w-full p-2 border rounded-md focus:ring-green-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-600">Category</label>
                        <select id="itemCategory" class="mt-1 w-full p-2 border rounded-md bg-white">
                            <option>Fresh Juices</option>
                            <option>Milkshakes</option>
                            <option>Mocktails</option>
                            <option>Fast Food & Snacks</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-600">Price (₹)</label>
                        <input type="number" id="itemPrice" required placeholder="80" class="mt-1 w-full p-2 border rounded-md focus:ring-green-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-600">Assign To Kitchen</label>
                        <select id="itemKitchen" class="mt-1 w-full p-2 border rounded-md bg-white border-green-400 font-semibold text-green-800">
                            <option value="Kitchen 1 (Beverages)">Kitchen 1 (Juice & Shakes Bar)</option>
                            <option value="Kitchen 2 (Snacks)">Kitchen 2 (Fast Food & Snacks)</option>
                        </select>
                        <p class="text-xs text-gray-400 mt-1">Order punch hote hi ye item sirf isi kitchen ki screen par bajega.</p>
                    </div>

                    <button type="submit" class="w-full bg-green-700 text-white py-2 rounded-md hover:bg-green-800 font-medium transition shadow-md">
                        + Save to Live Menu
                    </button>
                </form>
            </div>

            <!-- RIGHT SIDE: LIVE MENU TABLE (Takes 2 Columns) -->
            <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-sm">
                <h2 class="text-xl font-bold mb-4 text-gray-700">Current Database Items</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b bg-gray-50 text-gray-600 text-sm">
                                <th class="p-3">Item Name</th>
                                <th class="p-3">Category</th>
                                <th class="p-3">Price</th>
                                <th class="p-3">Target Kitchen</th>
                                <th class="p-3">Action</th>
                            </tr>
                        </thead>
                        <tbody id="menuTableBody" class="divide-y text-sm text-gray-700">
                            <!-- Javascript items dynamically yaha load karega -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- REALTIME JAVASCRIPT LOGIC -->
    <script>
        const menuForm = document.getElementById('menuForm');
        const menuTableBody = document.getElementById('menuTableBody');

        // Browser ki memory (LocalStorage) se menu uthao, agar khali hai toh 2 dummy items daal do
        let menuItems = JSON.parse(localStorage.getItem('sapnaJuiceMenu')) || [
            { name: "Special Sapna Cocktail Juice", category: "Fresh Juices", price: 90, kitchen: "Kitchen 1 (Beverages)" },
            { name: "Bombay Kachori Club Sandwich", category: "Fast Food & Snacks", price: 110, kitchen: "Kitchen 2 (Snacks)" }
        ];

        // Table ko screen par dikhane ka function
        function renderMenuTable() {
            menuTableBody.innerHTML = '';
            menuItems.forEach((item, index) => {
                let kitchenBadgeColor = item.kitchen.includes("Kitchen 1") ? "bg-blue-100 text-blue-800" : "bg-orange-100 text-orange-800";
                
                let row = `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-3 font-semibold text-gray-900">${item.name}</td>
                        <td class="p-3 text-gray-500">${item.category}</td>
                        <td class="p-3 font-bold text-green-700">₹${item.price}</td>
                        <td class="p-3">
                            <span class="px-2 py-1 rounded text-xs font-medium ${kitchenBadgeColor}">
                                ${item.kitchen}
                            </span>
                        </td>
                        <td class="p-3">
                            <button onclick="deleteItem(${index})" class="text-red-500 hover:text-red-700 font-bold px-2 py-1 rounded hover:bg-red-50">Delete</button>
                        </td>
                    </tr>
                `;
                menuTableBody.innerHTML += row;
            });
            // Naye menu ko browser me save kar do
            localStorage.setItem('sapnaJuiceMenu', JSON.stringify(menuItems));
        }

        // Jab Form submit ho (Add button dabe)
        menuForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const newItem = {
                name: document.getElementById('itemName').value,
                category: document.getElementById('itemCategory').value,
                price: Number(document.getElementById('itemPrice').value),
                kitchen: document.getElementById('itemKitchen').value
            };
            menuItems.push(newItem);
            renderMenuTable();
            menuForm.reset(); // Form wapas khali kar do
        });

        // Delete button ka function
        function deleteItem(index) {
            if(confirm("Pakka is item ko menu se hatana chahte hain?")) {
                menuItems.splice(index, 1);
                renderMenuTable();
            }
        }

        // Page load hote hi table dikha do
        renderMenuTable();
    </script>
</body>
</html>
