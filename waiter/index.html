<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Captain Pad - Sapna Juice</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Supabase Official Cloud JS SDK -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<script src="../sapna-core.js"></script>

<script src="../sapna-core.js"></script>

<style>

/* Strict Viewport Lock - No scrolling on body ever */

html, body {

height: 100dvh;

width: 100vw;

margin: 0;

padding: 0;

overflow: hidden;

background-color: #f8fafc;

}

button, input { touch-action: manipulation; }

::-webkit-scrollbar { width: 4px; background: transparent; }

::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }


/* Truncate multiple lines safely */

.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

</style>

</head>

<body class="font-sans text-slate-800 select-none antialiased">



<div class="flex w-full h-[100dvh] overflow-hidden bg-slate-900">



<div id="view_Tables" class="flex flex-col w-full lg:w-80 xl:w-[400px] shrink-0 border-r border-slate-300 bg-slate-100 z-10">


<header class="p-4 bg-emerald-900 border-b border-emerald-800 text-center shrink-0 shadow-lg flex items-center justify-between">

<div class="w-10 h-10 bg-white text-emerald-950 rounded-xl flex items-center justify-center font-black text-xl shadow-md">📱</div>

<div class="text-right">

<h1 class="text-base font-black tracking-widest text-emerald-100"> SAPANA JUICE</h1>

<p class="text-[10px] text-emerald-300 uppercase tracking-wider font-bold">CAPTAIN PAD</p>

</div>

</header>



<div class="flex-1 overflow-y-auto p-4 bg-slate-100" id="tableZonesContainer">

</div>

</div>



<div id="view_Menu" class="hidden lg:flex flex-col w-full flex-1 bg-slate-50 relative z-20">


<div id="desktopEmptyState" class="absolute inset-0 bg-slate-50 z-40 hidden lg:flex flex-col items-center justify-center text-slate-400">

<span class="text-7xl mb-4 opacity-50">👈</span>

<h2 class="text-2xl font-black text-slate-500">Select a Table</h2>

<p class="text-sm font-bold mt-2">Left panel se order lene ke liye table chunein</p>

</div>



<header class="bg-emerald-900 lg:bg-white text-white lg:text-slate-800 h-16 flex items-center justify-between px-3 lg:px-6 shadow-sm shrink-0 border-b border-slate-200">


<button onclick="goBackToTables()" class="lg:hidden bg-emerald-800 px-3 py-2 rounded-lg text-xs font-black flex items-center gap-1 active:scale-95">

← Back

</button>


<div class="text-center lg:text-left flex-1 px-2 min-w-0">

<span class="block text-[9px] text-emerald-300 lg:text-slate-400 uppercase font-black tracking-widest truncate" id="activeZoneName">ZONE</span>

<h2 class="text-sm lg:text-xl font-black text-amber-300 lg:text-emerald-800 truncate" id="activeTableTitle">Table 1</h2>

</div>



<button onclick="openCart()" class="bg-white lg:bg-emerald-100 text-emerald-950 px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 shadow-sm active:scale-95 shrink-0">

🛒 <span id="badgeCart" class="bg-emerald-600 text-white font-black px-2 py-0.5 rounded-full text-[10px]">0</span>

</button>

</header>



<div class="bg-white border-b border-slate-200 p-3 flex gap-2 overflow-x-auto shrink-0 shadow-xs" id="containerCategories"></div>



<div class="flex-1 overflow-y-auto p-3 lg:p-6 bg-slate-100/50">

<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-3 xl:grid-cols-4 gap-3 lg:gap-4" id="containerMenuItems"></div>

</div>



<div class="bg-emerald-950 lg:bg-white text-white lg:text-slate-800 p-4 flex justify-between items-center shrink-0 border-t border-emerald-900 lg:border-slate-200 pb-safe">

<div>

<span class="text-[9px] text-emerald-400 lg:text-slate-400 uppercase block font-bold tracking-wider">New Items Total</span>

<span class="text-xl lg:text-2xl font-black text-white lg:text-emerald-700" id="txtCartTotal">₹0</span>

</div>

<button onclick="openCart()" id="btnReview" disabled class="bg-amber-400 lg:bg-emerald-600 hover:bg-amber-300 disabled:bg-slate-700 lg:disabled:bg-slate-200 disabled:text-slate-500 lg:disabled:text-slate-400 text-emerald-950 lg:text-white font-black px-6 py-3 lg:px-8 lg:py-3.5 rounded-xl text-xs sm:text-sm uppercase tracking-wider transition active:scale-95 shadow-md">

Review KOT 👉

</button>

</div>

</div>



<div id="modalCart" class="fixed inset-0 bg-slate-950/80 z-50 hidden flex-col justify-end lg:justify-center lg:items-center backdrop-blur-sm">

<div class="bg-white w-full lg:w-[500px] rounded-t-3xl lg:rounded-3xl max-h-[85vh] flex flex-col overflow-hidden shadow-2xl">


<div class="p-4 bg-emerald-900 text-white flex justify-between items-center shrink-0">

<div>

<h3 class="font-black text-sm uppercase tracking-wider text-amber-300">Ticket Overview</h3>

<span class="text-[10px] text-emerald-200" id="lblCartTable">Table X</span>

</div>

<button onclick="closeCart()" class="w-8 h-8 bg-emerald-800 rounded-full text-white font-black text-xs">✕</button>

</div>


<div class="flex-1 overflow-y-auto p-4 lg:p-6 space-y-5 bg-slate-50">

<div>

<span class="text-[10px] font-black text-emerald-600 uppercase tracking-widest block mb-2 border-b border-emerald-200 pb-1">New Order Punch</span>

<div id="listNewCart" class="space-y-2"></div>

</div>

<div id="sectionRunning" class="hidden">

<span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 border-b border-slate-200 pb-1">Already Cooking</span>

<div id="listRunning" class="space-y-1.5 opacity-70"></div>

</div>

</div>



<div class="p-4 bg-white border-t border-slate-200 shrink-0">

<button onclick="fireKOT()" id="btnFire" class="w-full bg-emerald-700 hover:bg-emerald-600 text-white font-black py-4 rounded-xl text-sm uppercase tracking-wider shadow-lg active:scale-95 flex items-center justify-center gap-2">

🔥 SEND TO KITCHEN

</button>

</div>

</div>

</div>



</div>



<script>

let TBL = null;

let CAT = 'ALL';

let CART = {};



// Hard Toggle Logic for Mobile vs Desktop

function applyDisplayLayout() {

const vTables = document.getElementById('view_Tables');

const vMenu = document.getElementById('view_Menu');

const isDesktop = window.innerWidth >= 1024; // lg breakpoint in tailwind



if (isDesktop) {

// Desktop: Dono humesha dikhenge

vTables.classList.remove('hidden'); vTables.classList.add('flex');

vMenu.classList.remove('hidden'); vMenu.classList.add('flex');

} else {

// Mobile: Agar table selected hai toh menu dikhao, warna table list dikhao

if (TBL) {

vTables.classList.add('hidden'); vTables.classList.remove('flex');

vMenu.classList.remove('hidden'); vMenu.classList.add('flex');

} else {

vTables.classList.remove('hidden'); vTables.classList.add('flex');

vMenu.classList.add('hidden'); vMenu.classList.remove('flex');

}

}

}



// Screen Resize pe layout fix rakhna taaki phate na

window.addEventListener('resize', applyDisplayLayout);



function initTables() {

const db = Sapna.get();

const container = document.getElementById('tableZonesContainer');

container.innerHTML = '';



const zones = {};

db.tables.forEach(t => {

let area = t.area || 'Main Floor';

if(!zones[area]) zones[area] = [];

zones[area].push(t);

});



Object.keys(zones).forEach(zoneName => {

let zoneHTML = `<div class="mb-4"><h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-3 border-b border-slate-200 pb-1">${zoneName}</h3><div class="grid grid-cols-2 lg:grid-cols-2 gap-3">`;



zones[zoneName].forEach(t => {

const activeOrder = db.activeOrders.find(o => o.tableId === t.id);

let stBg = "bg-white border-slate-200 text-slate-800 shadow-sm";

let stBadge = `<span class="text-[10px] text-slate-400 font-bold uppercase">Vacant</span>`;



if(activeOrder) {

stBg = "bg-amber-50 border-amber-400 text-amber-900 shadow-md";

stBadge = `<span class="text-[10px] bg-amber-500 text-white font-black px-2 py-0.5 rounded uppercase">Live (${activeOrder.items.length})</span>`;

}

if(t.isParcel) stBg += " col-span-2 bg-slate-900 border-slate-800 text-white";



zoneHTML += `

<button onclick="selectTbl('${t.id}', '${t.label}', '${zoneName}')" class="p-3.5 lg:p-4 rounded-2xl border-2 flex flex-col justify-between items-start h-20 lg:h-24 transition active:scale-95 text-left ${stBg}">

<span class="font-black text-sm lg:text-base truncate w-full">${t.label}</span>

${stBadge}

</button>

`;

});

container.innerHTML += zoneHTML + `</div></div>`;

});

applyDisplayLayout();

}



window.selectTbl = (id, label, area) => {

TBL = { id, label, area };

document.getElementById('activeTableTitle').innerText = label;

document.getElementById('activeZoneName').innerText = area;

document.getElementById('lblCartTable').innerText = `${area} - ${label}`;

CART = {};


document.getElementById('desktopEmptyState').classList.replace('lg:flex', 'hidden');


buildCategories(); buildMenu(); updateCartMath();

applyDisplayLayout();

};



window.goBackToTables = () => {

TBL = null; // Clear selection

CART = {};

applyDisplayLayout();

initTables();

};



function buildCategories() {

const db = Sapna.get();

const catContainer = document.getElementById('containerCategories');

// Check if db.categories exists, otherwise fallback to map

const safeCats = db.categories || [...new Set(db.menu.map(m => m.category))];

const uniqueCats = ['ALL', ...safeCats];



catContainer.innerHTML = uniqueCats.map(c => `

<button onclick="setCat('${c}')" class="px-4 py-2 rounded-xl text-[11px] font-black shrink-0 transition border shadow-xs ${CAT === c ? 'bg-emerald-900 text-white border-emerald-900' : 'bg-slate-50 text-slate-500 border-slate-200'}">

${c}

</button>

`).join('');

}



window.setCat = (c) => { CAT = c; buildCategories(); buildMenu(); };



function buildMenu() {

const db = Sapna.get();

const grid = document.getElementById('containerMenuItems');

grid.innerHTML = '';

const filtered = db.menu.filter(m => CAT === 'ALL' || m.category === CAT);



filtered.forEach(item => {

const qty = CART[item.id] ? CART[item.id].qty : 0;

grid.innerHTML += `

<div onclick="addCart('${item.id}')" class="bg-white p-3 rounded-2xl border-2 ${qty > 0 ? 'border-emerald-500 bg-emerald-50/40' : 'border-slate-200'} shadow-sm flex flex-col justify-between h-28 lg:h-32 active:scale-95 transition cursor-pointer relative overflow-hidden min-w-0">

${qty > 0 ? `<span class="absolute top-0 right-0 bg-emerald-600 text-white font-black text-[10px] px-2 py-0.5 rounded-bl-lg">x${qty}</span>` : ''}


<h4 class="font-black text-xs lg:text-sm text-slate-800 leading-snug line-clamp-2 pr-2">${item.name}</h4>


<div class="flex justify-between items-end mt-2 pt-2 border-t border-slate-100">

<span class="text-sm font-black text-emerald-700">₹${item.price}</span>

<span class="w-6 h-6 shrink-0 rounded-full ${qty > 0 ? 'bg-emerald-600' : 'bg-slate-200 lg:bg-slate-100 lg:text-slate-500'} text-white flex items-center justify-center text-xs font-black transition-colors">+</span>

</div>

</div>

`;

});

}



window.addCart = (mId) => {

const item = Sapna.get().menu.find(m => m.id === mId);

if(!item) return;

if(!CART[mId]) CART[mId] = { ...item, qty: 0 };

CART[mId].qty++;

buildMenu(); updateCartMath();

};



window.qtyBtn = (mId, delta) => {

if(!CART[mId]) return;

CART[mId].qty += delta;

if(CART[mId].qty <= 0) delete CART[mId];

updateCartMath(); buildMenu();

};



function updateCartMath() {

let totalQty = 0; let totalAmt = 0;

Object.values(CART).forEach(i => { totalQty += i.qty; totalAmt += (i.price * i.qty); });

document.getElementById('badgeCart').innerText = totalQty;

document.getElementById('txtCartTotal').innerText = `₹${totalAmt}`;

document.getElementById('btnReview').disabled = totalQty === 0;

buildDrawerItems();

}



function buildDrawerItems() {

const listNew = document.getElementById('listNewCart'); listNew.innerHTML = '';

let cCount = 0;

Object.values(CART).forEach(item => {

cCount++;

listNew.innerHTML += `

<div class="bg-white border border-emerald-100 p-3 lg:p-4 rounded-xl flex justify-between items-center shadow-sm gap-2">

<span class="font-black text-xs lg:text-sm text-slate-800 truncate flex-1">${item.name}</span>

<div class="flex items-center gap-2 lg:gap-4 shrink-0">

<span class="font-black text-sm text-emerald-700">₹${item.price * item.qty}</span>

<div class="flex bg-slate-100 rounded-lg overflow-hidden border border-slate-200">

<button onclick="qtyBtn('${item.id}', -1)" class="w-7 h-7 lg:w-9 lg:h-9 font-black text-slate-700 hover:bg-slate-200">-</button>

<span class="w-6 flex items-center justify-center text-xs font-black bg-white">${item.qty}</span>

<button onclick="qtyBtn('${item.id}', 1)" class="w-7 h-7 lg:w-9 lg:h-9 font-black text-slate-700 hover:bg-slate-200">+</button>

</div>

</div>

</div>

`;

});

if(cCount === 0) listNew.innerHTML = `<p class="text-[10px] text-slate-400 italic">No new items in basket.</p>`;



const activeOrder = Sapna.get().activeOrders.find(o => o.tableId === TBL?.id);

const secRun = document.getElementById('sectionRunning');

const listRun = document.getElementById('listRunning');


if(activeOrder && activeOrder.items.length > 0) {

secRun.classList.remove('hidden');

listRun.innerHTML = activeOrder.items.map(i => `

<div class="flex justify-between items-center bg-slate-200 px-3 py-2 rounded-lg text-[10px] lg:text-xs font-bold text-slate-700">

<span class="truncate pr-2 flex-1">${i.name}</span>

<span class="uppercase font-black px-2 py-0.5 rounded text-[9px] shrink-0 ${i.status === 'READY' ? 'bg-emerald-600 text-white' : 'bg-amber-500 text-white'}">${i.status}</span>

</div>

`).join('');

} else { secRun.classList.add('hidden'); }

}



window.openCart = () => { document.getElementById('modalCart').classList.replace('hidden', 'flex'); };

window.closeCart = () => { document.getElementById('modalCart').classList.replace('flex', 'hidden'); };



window.fireKOT = () => {

let itemsToCook = [];

Object.values(CART).forEach(item => {

for(let i=0; i<item.qty; i++) itemsToCook.push({ id: item.id, name: item.name, price: item.price, category: item.category, kitchenId: item.kitchenId });

});

if(itemsToCook.length === 0) return;

let oType = TBL.id === 'TBL_PARCEL' ? 'PARCEL' : 'DINE_IN';

Sapna.punchOrder(TBL.id, itemsToCook, oType);

closeCart();


// Soft reset - keep table open on desktop, go back to tables on mobile

if(window.innerWidth < 1024) {

goBackToTables();

} else {

CART = {}; updateCartMath(); buildMenu(); initTables();

}

};



window.addEventListener('SAPNA_STATE_UPDATED', () => {

if(!TBL) initTables();

else { initTables(); buildDrawerItems(); }

});



initTables();

</script>

</body>

</html>
